name: Lighthouse CI 
 on: [pull_request] 
 jobs: 
   lhci: 
     runs-on: ubuntu-latest 
     steps: 
       - uses: actions/checkout@v4 
       - uses: actions/setup-node@v4 
         with: 
           node-version: 20 
       - run: npm ci 
       - run: npm run build 
       - uses: treosh/lighthouse-ci-action@v11 
         with: 
           uploadArtifacts: true 
           temporaryPublicStorage: true 
           runs: 3 
           budgetPath: .lighthouserc.json 
