<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="680" height="340" role="img" aria-label="ZEROHOUR Logo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="300" height="300" fill="#08090E" rx="12" align="center" x="190" y="20"/>

  <!-- Faint ZH watermark 
  <text x="340" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="'Orbitron', monospace" font-weight="700" font-size="150"
        fill="#C4871C" opacity="0.045" letter-spacing="-5">ZH</text> 
        -->

  <!-- Corner military brackets 
  <path d="M44,44 L44,60 M44,44 L60,44" stroke="#C4871C" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M636,44 L636,60 M636,44 L620,44" stroke="#C4871C" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M44,296 L44,280 M44,296 L60,296" stroke="#C4871C" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M636,296 L636,280 M636,296 L620,296" stroke="#C4871C" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
-->
  <!-- Outer hexagon (pointy-top, r=72, center 340,148) -->
  <polygon points="340,76 402.4,112 402.4,184 340,220 277.6,184 277.6,112"
           fill="#C4871C" fill-opacity="0.035"
           stroke="#C4871C" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Outer hex vertex rivets -->
  <circle cx="340"   cy="76"  r="2.5" fill="#C4871C"/>
  <circle cx="402.4" cy="112" r="2.5" fill="#C4871C"/>
  <circle cx="402.4" cy="184" r="2.5" fill="#C4871C"/>
  <circle cx="340"   cy="220" r="2.5" fill="#C4871C"/>
  <circle cx="277.6" cy="184" r="2.5" fill="#C4871C"/>
  <circle cx="277.6" cy="112" r="2.5" fill="#C4871C"/>

  <!-- Inner hexagon (r=58, center 340,148) -->
  <polygon points="340,90 390.2,119 390.2,177 340,206 289.8,177 289.8,119"
           fill="none" stroke="#C4871C" stroke-width="0.8" stroke-linejoin="round" opacity="0.55"/>

  <!-- Scope circle (r=42, center 340,148) -->
  <circle cx="340" cy="148" r="42" fill="#C4871C" fill-opacity="0.03"
          stroke="#C4871C" stroke-width="1.1"/>

  <!-- Rank bars — top gap -->
  <rect x="327" y="95.5" width="26" height="2.5" rx="1.25" fill="#C4871C"/>
  <rect x="327" y="101"  width="26" height="2.5" rx="1.25" fill="#C4871C"/>

  <!-- Rank bars — bottom gap -->
  <rect x="327" y="193"  width="26" height="2.5" rx="1.25" fill="#C4871C"/>
  <rect x="327" y="198.5" width="26" height="2.5" rx="1.25" fill="#C4871C"/>

  <!-- Crosshair lines -->
  <line x1="298" y1="148" x2="333" y2="148" stroke="#C4871C" stroke-width="0.9"/>
  <line x1="347" y1="148" x2="382" y2="148" stroke="#C4871C" stroke-width="0.9"/>
  <line x1="340" y1="106" x2="340" y2="141" stroke="#C4871C" stroke-width="0.9"/>
  <line x1="340" y1="155" x2="340" y2="190" stroke="#C4871C" stroke-width="0.9"/>

  <!-- Cardinal tick marks -->
  <line x1="340" y1="100" x2="340" y2="106" stroke="#C4871C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="340" y1="190" x2="340" y2="196" stroke="#C4871C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="288" y1="148" x2="298" y2="148" stroke="#C4871C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="382" y1="148" x2="392" y2="148" stroke="#C4871C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center bullseye -->
  <circle cx="340" cy="148" r="4"   fill="#C4871C"/>
  <circle cx="340" cy="148" r="1.8" fill="#08090E"/>

  <!-- Flanking rules 
  <line x1="52"  y1="265" x2="202" y2="265" stroke="#C4871C" stroke-width="0.7" opacity="0.5"/>
  <line x1="478" y1="265" x2="628" y2="265" stroke="#C4871C" stroke-width="0.7" opacity="0.5"/>
-->
  <!-- Diamond separators -->
  <polygon points="209,265 213,260 217,265 213,270" fill="#C4871C" opacity="0.7"/>
  <polygon points="471,265 467,260 463,265 467,270" fill="#C4871C" opacity="0.7"/>

  <!-- ZEROHOUR wordmark -->
  <text x="340" y="265" text-anchor="middle" dominant-baseline="central"
        font-family="'Orbitron', monospace" font-weight="700" font-size="30"
        letter-spacing="5" fill="#E9EBF2">ZEROHOUR</text>

</svg>
